<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; font-src 'self' data:;">
  <title>MDViewer Panel</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
</head>
<body class="light-mode detached-panel-body">
  <div class="detached-panel-shell" id="detached-panel-shell">
    <div class="detached-panel-header">
      <div class="detached-panel-title" id="detached-panel-title">MDViewer</div>
      <div class="panel-header-actions detached-panel-actions" id="detached-panel-actions" style="display:none;">
        <button class="btn-panel-action" id="btn-detached-terminal-copy" title="복사">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span>복사</span>
        </button>
        <button class="btn-panel-action" id="btn-detached-terminal-insert-file" title="파일 삽입">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <path d="M14 2v6h6"/>
          </svg>
          <span>파일 삽입</span>
        </button>
        <button class="btn-panel-action" id="btn-detached-terminal-insert-folder" title="폴더 삽입">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>폴더 삽입</span>
        </button>
        <button class="btn-panel-action" id="btn-detached-terminal-paste" title="텍스트 삽입">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1"/>
            <path d="M9 12h6"/>
            <path d="M9 16h6"/>
          </svg>
          <span>텍스트 삽입</span>
        </button>
        <button class="btn-panel-action" id="btn-detached-terminal-restart" title="재시작">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2v6h-6"/>
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          <span>재시작</span>
        </button>
      </div>
      <button class="btn-panel-action" id="btn-dock-panel">Dock</button>
    </div>
    <div class="detached-panel-content" id="detached-panel-content"></div>
  </div>

  <div class="modal-overlay" id="detached-terminal-paste-modal" style="display:none;">
    <div class="terminal-paste-modal">
      <div class="rename-modal-header">
        <span class="rename-modal-title" id="detached-terminal-paste-title">텍스트 삽입</span>
        <button class="rename-modal-close" id="detached-terminal-paste-close">✕</button>
      </div>
      <div class="rename-modal-body">
        <textarea id="detached-terminal-paste-input" class="terminal-paste-input" rows="8"></textarea>
      </div>
      <div class="rename-modal-footer">
        <button class="btn-rename-cancel" id="btn-detached-terminal-paste-cancel">취소</button>
        <button class="btn-rename-confirm" id="btn-detached-terminal-paste-confirm">삽입</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="panel-window.js"></script>
</body>
</html>
