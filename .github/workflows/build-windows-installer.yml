# MDViewer Windows 인스톨러 자동 빌드
#
# 실행 조건
#   1. 버전 태그 push 시 자동 (예: git tag v1.4.0 && git push origin v1.4.0)
#   2. GitHub Actions 탭 > 이 워크플로우 선택 > Run workflow 버튼으로 수동 실행
#
# 결과물
#   - 태그 push 시: GitHub Releases에 .exe 인스톨러 자동 업로드
#   - 수동 실행 시: Actions > 해당 실행 > Artifacts에서 다운로드

name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: "저장소 체크아웃"
        uses: actions/checkout@v4

      - name: "Node.js 설치 (v20)"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "의존성 설치 (npm install)"
        run: npm install

      - name: "Windows 인스톨러 빌드"
        run: npm run build:win

      - name: "빌드 결과물 업로드 (Artifacts)"
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-Windows-Installer
          path: dist/*.exe

      - name: "GitHub Releases에 업로드 (태그 push 시에만)"
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
