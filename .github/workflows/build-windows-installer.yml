# MDViewer Windows 인스톨러 자동 빌드
#
# [원인 분석 - 2026-05-15]
#   - windows-latest가 VS2026 기반 Windows Server 2025로 전환 중 (2026-06-08~15)
#   - node-gyp이 VS2026(18.x) 인식 실패 → "Could not find any Visual Studio" 오류
#   - 해결: windows-2022 고정 + ilammy/msvc-dev-cmd로 MSVC 전체 환경 주입
#
# 실행 조건
#   1. 버전 태그 push 시 자동 (예: git tag v1.4.0 && git push origin v1.4.0)
#   2. GitHub Actions 탭 > 이 워크플로우 선택 > Run workflow 버튼으로 수동 실행
#
# 결과물
#   - 태그 push 시: GitHub Releases에 .exe 인스톨러 자동 업로드
#   - 수동 실행 시: Actions > 해당 실행 > Artifacts에서 다운로드

name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-2022
    env:
      GYP_MSVS_VERSION: 2022

    steps:
      - name: "저장소 체크아웃"
        uses: actions/checkout@v4

      - name: "Node.js 설치 (v20)"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "MSVC 개발자 환경 설정 (node-pty 네이티브 빌드용)"
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          vsversion: '2022'

      - name: "의존성 설치 (npm install)"
        run: npm install

      - name: "Windows 인스톨러 빌드"
        run: npm run build:win

      - name: "빌드 결과물 업로드 (Artifacts)"
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-Windows-Installer
          path: dist/*.exe

      - name: "GitHub Releases에 업로드 (태그 push 시에만)"
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
